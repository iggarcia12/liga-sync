<div class="app-wrapper">
  <!-- Navbar Global Sticky -->
  <header class="global-navbar" *ngIf="mostrarMenu()">
    <div class="navbar-container">
      <div class="navbar-brand">
        <span class="brand-icon">🏆</span>
        <span class="brand-name">LigaSync <strong>PRO</strong></span>
      </div>

      <nav class="navbar-links">
        <!-- Todos los roles ven estas secciones (solo lectura para no-admin) -->
        <a routerLink="/dashboard" routerLinkActive="active-link" [routerLinkActiveOptions]="{exact: true}">
          <span class="icon">📊</span> Inicio
        </a>
        <a routerLink="/estadisticas" routerLinkActive="active-link">
          <span class="icon">📈</span> Estadísticas
        </a>
        <a routerLink="/equipos" routerLinkActive="active-link">
          <span class="icon">🛡️</span> Plantillas
        </a>
        <a routerLink="/partidos" routerLinkActive="active-link">
          <span class="icon">⚽</span> Partidos
        </a>
        <a routerLink="/mercado" routerLinkActive="active-link">
          <span class="icon">🤝</span> Mercado
        </a>

        <!-- Jugador: Mi Perfil -->
        <a *ngIf="authService.isJugador()" routerLink="/mi-perfil" routerLinkActive="active-link">
          <span class="icon">👤</span> Mi Perfil
        </a>

        <!-- Entrenador: Mi Equipo (gestión de su plantilla) -->
        <a *ngIf="authService.isEntrenador()" routerLink="/mi-equipo" routerLinkActive="active-link">
          <span class="icon">🏟️</span> Mi Equipo
        </a>

        <!-- Jugadores, entrenadores y admin ven Mensajes -->
        <a *ngIf="authService.isJugador() || authService.isEntrenador() || authService.isAdmin()" routerLink="/mensajes" routerLinkActive="active-link">
          <span class="icon">✉️</span> Mensajes
        </a>

        <!-- Admin: panel de administración -->
        <ng-container *ngIf="authService.isAdmin()">

          <a routerLink="/admin" routerLinkActive="active-link">
            <span class="icon">⚙️</span> Admin
          </a>
        </ng-container>
      </nav>

      <div class="navbar-actions">
        <button class="btn-icon theme-toggle" (click)="toggleTheme()" [attr.aria-label]="isDarkMode ? 'Activar modo claro' : 'Activar modo oscuro'">
          <span *ngIf="isDarkMode">☀️</span>
          <span *ngIf="!isDarkMode">🌙</span>
        </button>
        <button (click)="salir()" class="btn-logout" title="Cerrar Sesión">
          <span>🚪</span> <span class="logout-text">Salir</span>
        </button>
      </div>
    </div>
  </header>

  <!-- Contenido Principal -->
  <main class="main-content">
    <router-outlet></router-outlet>
  </main>
</div>
