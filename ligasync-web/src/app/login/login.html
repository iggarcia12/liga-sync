<div class="pagina-login">

  <!-- Panel lateral visual -->
  <div class="login-lateral">
    <div class="login-lateral__contenido">
      <img src="assets/logo.png" alt="LigaSync Logo" class="login-lateral__logo" />
      <p class="login-lateral__lema">{{ 'LOGIN.LEMA' | translate }}</p>
      <div class="login-lateral__deco">
        <div class="deco-circulo"></div>
        <div class="deco-circulo deco-circulo--2"></div>
        <div class="deco-circulo deco-circulo--3"></div>
      </div>
    </div>
  </div>

  <!-- Panel del formulario -->
  <div class="login-formulario">
    <div class="tarjeta-login">

      <div class="login-brand-movil">
        <img src="assets/logo.png" alt="LigaSync Logo" class="login-brand-movil__logo" />
      </div>

      <h2>{{ 'LOGIN.TITULO' | translate }}</h2>
      <p class="login-descripcion">{{ 'LOGIN.DESCRIPCION' | translate }}</p>

      <div class="caja-error" *ngIf="mensajeError">
        {{ mensajeError }}
      </div>

      <form (ngSubmit)="hacerLogin()">
        <div class="grupo-input">
          <label>{{ 'LOGIN.EMAIL' | translate }}</label>
          <input
            type="email"
            name="email"
            [(ngModel)]="email"
            required
            [placeholder]="'LOGIN.EMAIL_PH' | translate"
          />
        </div>

        <div class="grupo-input">
          <label>{{ 'LOGIN.CONTRASENA' | translate }}</label>
          <input type="password" name="pass" [(ngModel)]="pass" required [placeholder]="'LOGIN.CONTRASENA_PH' | translate" />
        </div>

        <button type="submit" class="btn-entrar">{{ 'LOGIN.BTN_ENTRAR' | translate }}</button>
      </form>

      <div class="separador-oauth">
        <span>{{ 'LOGIN.SEPARADOR' | translate }}</span>
      </div>

      <div id="google-btn-container" class="google-btn-wrapper"></div>

      <p class="link-registro">{{ 'LOGIN.LINK_REGISTRO' | translate }} <a routerLink="/registro">{{ 'LOGIN.LINK_REGISTRO_BTN' | translate }}</a></p>
    </div>
  </div>

</div>
